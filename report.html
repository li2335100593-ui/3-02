<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exposure Journal V2</title>
  <style>
    :root {
      --bg: #ffffff;
      --ink: #1b1b1b;
      --muted: #686868;
      --line: #e5e7eb;
      --line-strong: #d5d8de;
      --card: #ffffff;
      --soft: #f8fafc;
      --accent: #0f5bd8;
      --accent-soft: #e8f0ff;
      --danger: #b42318;
      --radius: 10px;
      --shadow: 0 6px 18px rgba(20, 24, 32, 0.06);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    .wrap {
      max-width: 1360px;
      margin: 0 auto;
      padding: 20px 20px 36px;
    }

    .masthead {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 2px solid #141414;
      margin-bottom: 16px;
    }
    .title {
      margin: 0;
      font-size: clamp(28px, 3.6vw, 44px);
      letter-spacing: 0.6px;
      font-weight: 800;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .toolbar,
    .filters,
    .kpis,
    .main-panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 12px;
      margin-bottom: 12px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto;
      gap: 8px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.3fr 1fr auto auto auto;
      gap: 8px;
      align-items: start;
    }

    input, button, select {
      width: 100%;
      border: 1px solid var(--line-strong);
      background: #fff;
      color: var(--ink);
      border-radius: 8px;
      padding: 9px 10px;
      font: 14px/1.2 "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    select[multiple] {
      min-height: 124px;
      padding: 6px;
    }
    button {
      cursor: pointer;
      font-weight: 600;
    }
    button.primary {
      background: #161616;
      color: #fff;
      border-color: #161616;
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }
    .kpi {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: var(--soft);
    }
    .kpi h4 {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }
    .kpi .v {
      margin-top: 6px;
      font-size: 34px;
      line-height: 1;
      font-weight: 800;
    }

    .main-panel h3 {
      margin: 0 0 10px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    td.url {
      max-width: 320px;
      word-break: break-all;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 12px;
    }
    tr.url-row:hover {
      background: #f7faff;
    }
    tr.url-row.active {
      background: var(--accent-soft);
    }

    .actions {
      white-space: nowrap;
    }
    .tiny {
      width: auto;
      padding: 5px 8px;
      font-size: 12px;
    }

    .detail-box {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      margin: 8px 0;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }
    .detail-metric {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: var(--soft);
    }
    .detail-metric .k {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-weight: 700;
    }
    .detail-metric .v {
      margin-top: 4px;
      font-size: 24px;
      font-weight: 800;
      color: var(--accent);
    }

    .subtables {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .user-ids {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      margin-top: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
      font-size: 12px;
      max-height: 160px;
      overflow: auto;
      background: #fff;
    }
    .muted { color: var(--muted); }
    .status {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .danger { color: var(--danger); }

    @media (max-width: 1080px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      .filters { grid-template-columns: 1fr 1fr; }
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .detail-grid { grid-template-columns: 1fr; }
      .subtables { grid-template-columns: 1fr; }
    }
    @media (max-width: 680px) {
      .toolbar,
      .filters,
      .kpis { grid-template-columns: 1fr; }
      .title { font-size: 30px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="masthead">
      <h1 class="title">EXPOSURE JOURNAL</h1>
      <p class="subtitle">Internal Analytics · Auto Carousel</p>
    </header>

    <section class="toolbar">
      <input id="from" type="datetime-local" />
      <input id="to" type="datetime-local" />
      <button id="refreshBtn" class="primary">刷新数据</button>
      <button id="csvBtn">下载 CSV</button>
    </section>

    <section class="filters">
      <select id="urlFilter" multiple></select>
      <input id="urlSearch" type="text" placeholder="搜索 URL 关键字" />
      <button id="applyFilterBtn" class="primary">应用筛选</button>
      <button id="clearFilterBtn">清空筛选</button>
      <button id="selectAllBtn">全选可见</button>
    </section>

    <section class="kpis">
      <article class="kpi"><h4>总曝光</h4><div class="v" id="kTotal">0</div></article>
      <article class="kpi"><h4>独立会话</h4><div class="v" id="kSid">0</div></article>
      <article class="kpi"><h4>独立 IP</h4><div class="v" id="kIp">0</div></article>
      <article class="kpi"><h4>设备类型数</h4><div class="v" id="kDevice">0</div></article>
    </section>

    <section class="main-panel">
      <h3>全部 URL 数据（表格优先）</h3>
      <table>
        <thead>
          <tr>
            <th style="width: 30%;">URL</th>
            <th>曝光</th>
            <th>独立IP</th>
            <th>每日重复IP</th>
            <th>主设备类型</th>
            <th>CTR代理</th>
            <th>最后曝光时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="mainBody"></tbody>
      </table>
      <div class="status" id="status">初始化中...</div>
    </section>
  </div>

  <script>
    var API_BASE = "https://exposure-analytics.li2335100593.workers.dev";
    var POLL_MS = 30000;

    var state = {
      allRows: [],
      configuredUrls: [],
      selectedUrls: [],
      expandedUrl: null,
      detailCache: Object.create(null),
      urlSearch: ""
    };

    function nowMs() { return Date.now(); }
    function toTs(v) { return v ? new Date(v).getTime() : null; }
    function setStatus(msg, isError) {
      var el = document.getElementById("status");
      el.textContent = msg;
      el.classList.toggle("danger", !!isError);
    }

    function setDefaultRange() {
      var now = new Date();
      var from = new Date(now.getTime() - 24 * 60 * 60 * 1000);
      document.getElementById("to").value = now.toISOString().slice(0, 16);
      document.getElementById("from").value = from.toISOString().slice(0, 16);
    }

    function getRange() {
      var from = toTs(document.getElementById("from").value);
      var to = toTs(document.getElementById("to").value);
      if (!from || !to || from >= to) {
        var fallbackTo = nowMs();
        var fallbackFrom = fallbackTo - 24 * 60 * 60 * 1000;
        return { from: fallbackFrom, to: fallbackTo };
      }
      return { from: from, to: to };
    }

    function formatNum(v) {
      var n = Number(v || 0);
      if (!Number.isFinite(n)) return "0";
      return n.toLocaleString();
    }

    function formatRatio(v) {
      var n = Number(v || 0);
      if (!Number.isFinite(n)) return "0.0000";
      return n.toFixed(4);
    }

    function formatTs(v, iso) {
      if (iso) {
        var dIso = new Date(iso);
        return isNaN(dIso.getTime()) ? "-" : dIso.toLocaleString();
      }
      var n = Number(v || 0);
      if (!Number.isFinite(n) || n <= 0) return "-";
      var d = new Date(n);
      return isNaN(d.getTime()) ? "-" : d.toLocaleString();
    }

    function escapeHtml(str) {
      return String(str == null ? "" : str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function selectedFromUi() {
      var options = Array.from(document.getElementById("urlFilter").options);
      return options.filter(function (o) { return o.selected; }).map(function (o) { return o.value; });
    }

    function refreshFilterOptions() {
      var select = document.getElementById("urlFilter");
      var pool = state.configuredUrls.length > 0
        ? state.configuredUrls
        : state.allRows.map(function (r) { return r.url; });

      var filteredPool = pool.filter(function (u) {
        if (!state.urlSearch) return true;
        return u.toLowerCase().indexOf(state.urlSearch.toLowerCase()) >= 0;
      });

      select.innerHTML = filteredPool.map(function (u) {
        var isSelected = state.selectedUrls.indexOf(u) >= 0 ? " selected" : "";
        return "<option value=\"" + encodeURIComponent(u) + "\"" + isSelected + ">" + escapeHtml(u) + "</option>";
      }).join("");

      Array.from(select.options).forEach(function (opt) {
        opt.value = decodeURIComponent(opt.value);
      });
    }

    function updateKpis(data) {
      var s = data.summary || {};
      var byDevice = data.by_device || [];
      document.getElementById("kTotal").textContent = formatNum(s.total_exposures);
      document.getElementById("kSid").textContent = formatNum(s.unique_sessions);
      document.getElementById("kIp").textContent = formatNum(s.unique_ips);
      document.getElementById("kDevice").textContent = formatNum(byDevice.length);
    }

    function renderMainTable() {
      var body = document.getElementById("mainBody");
      var rows = state.allRows;
      if (!rows || rows.length === 0) {
        body.innerHTML = "<tr><td colspan='8'>暂无数据</td></tr>";
        return;
      }

      var html = [];
      rows.forEach(function (r) {
        var active = state.expandedUrl === r.url ? " active" : "";
        html.push(
          "<tr class='url-row" + active + "' data-url='" + encodeURIComponent(r.url) + "'>" +
            "<td class='url'>" + escapeHtml(r.url) + "</td>" +
            "<td>" + formatNum(r.exposures) + "</td>" +
            "<td>" + formatNum(r.unique_ips) + "</td>" +
            "<td>" + formatNum(r.daily_repeated_ips) + "</td>" +
            "<td>" + escapeHtml(r.primary_device_type || "unknown") + "</td>" +
            "<td>" + formatRatio(r.engagement_ratio) + "</td>" +
            "<td>" + escapeHtml(formatTs(r.last_exposure_time, r.last_exposure_iso)) + "</td>" +
            "<td class='actions'><button class='tiny detail-btn' data-url='" + encodeURIComponent(r.url) + "'>详情</button></td>" +
          "</tr>"
        );

        if (state.expandedUrl === r.url) {
          html.push(
            "<tr><td colspan='8'>" + renderDetailBox(r.url) + "</td></tr>"
          );
        }
      });
      body.innerHTML = html.join("");

      body.querySelectorAll(".detail-btn").forEach(function (btn) {
        btn.addEventListener("click", function (e) {
          e.stopPropagation();
          var url = decodeURIComponent(btn.getAttribute("data-url"));
          toggleDetail(url);
        });
      });

      body.querySelectorAll("tr.url-row").forEach(function (tr) {
        tr.addEventListener("click", function () {
          var url = decodeURIComponent(tr.getAttribute("data-url"));
          toggleDetail(url);
        });
      });
    }

    function renderDetailTable(rows, cols) {
      if (!rows || rows.length === 0) {
        return "<tr><td colspan='" + cols.length + "'>暂无数据</td></tr>";
      }
      return rows.map(function (r) {
        return "<tr>" + cols.map(function (c) {
          return "<td>" + escapeHtml(r[c]) + "</td>";
        }).join("") + "</tr>";
      }).join("");
    }

    function renderDetailBox(url) {
      var d = state.detailCache[url];
      if (!d) {
        return "<div class='detail-box muted'>详情加载中...</div>";
      }

      var users = d.user_ids || [];
      var userHtml = users.length > 0
        ? users.map(function (u) { return "<div>" + escapeHtml(u) + "</div>"; }).join("")
        : "<div class='muted'>暂无用户 ID</div>";

      return (
        "<div class='detail-box'>" +
          "<div class='detail-grid'>" +
            "<div class='detail-metric'><div class='k'>该URL曝光</div><div class='v'>" + formatNum(d.exposures) + "</div></div>" +
            "<div class='detail-metric'><div class='k'>该URL独立IP</div><div class='v'>" + formatNum(d.unique_ips) + "</div></div>" +
            "<div class='detail-metric'><div class='k'>每日重复IP</div><div class='v'>" + formatNum(d.repeated_ip_days_total) + "</div></div>" +
          "</div>" +
          "<div class='subtables'>" +
            "<div>" +
              "<table><thead><tr><th>日期</th><th>重复IP</th><th>重复曝光</th></tr></thead><tbody>" +
              renderDetailTable(d.daily_repeat_ip || [], ["day", "repeat_ips", "repeat_exposures"]) +
              "</tbody></table>" +
            "</div>" +
            "<div>" +
              "<table><thead><tr><th>设备</th><th>曝光</th></tr></thead><tbody>" +
              renderDetailTable(d.by_device || [], ["device_type", "exposures"]) +
              "</tbody></table>" +
            "</div>" +
          "</div>" +
          "<div class='user-ids'><strong>用户唯一ID（文本）</strong><div style='margin-top:6px;'>" + userHtml + "</div></div>" +
        "</div>"
      );
    }

    async function loadDetail(url) {
      var range = getRange();
      var endpoint = API_BASE + "/api/report?from=" + range.from + "&to=" + range.to + "&url=" + encodeURIComponent(url) + "&page=1&page_size=100";
      var res = await fetch(endpoint, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      var data = await res.json();
      state.detailCache[url] = data.per_url_details || {
        url: url,
        exposures: 0,
        unique_ips: 0,
        repeated_ip_days_total: 0,
        daily_repeat_ip: [],
        by_device: [],
        user_ids: []
      };
    }

    async function toggleDetail(url) {
      if (state.expandedUrl === url) {
        state.expandedUrl = null;
        renderMainTable();
        return;
      }
      state.expandedUrl = url;
      renderMainTable();
      try {
        await loadDetail(url);
      } catch (e) {
        state.detailCache[url] = {
          exposures: 0,
          unique_ips: 0,
          repeated_ip_days_total: 0,
          daily_repeat_ip: [],
          by_device: [],
          user_ids: []
        };
        setStatus("详情加载失败：" + e.message, true);
      }
      renderMainTable();
    }

    async function loadReport() {
      var range = getRange();
      var endpoint = API_BASE + "/api/report?from=" + range.from + "&to=" + range.to;
      if (state.selectedUrls.length > 0) {
        endpoint += "&urls=" + state.selectedUrls.map(function (u) { return encodeURIComponent(u); }).join(",");
      }

      setStatus("加载中...", false);
      try {
        var res = await fetch(endpoint, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        var data = await res.json();

        state.allRows = data.by_url || [];
        state.configuredUrls = data.configured_urls || [];
        updateKpis(data);
        refreshFilterOptions();
        renderMainTable();
        setStatus("更新于 " + new Date().toLocaleString(), false);
      } catch (e) {
        setStatus("加载失败：" + e.message, true);
      }
    }

    function downloadCsv() {
      var range = getRange();
      var endpoint = API_BASE + "/api/report.csv?from=" + range.from + "&to=" + range.to;
      if (state.selectedUrls.length > 0) {
        endpoint += "&urls=" + state.selectedUrls.map(function (u) { return encodeURIComponent(u); }).join(",");
      }
      window.open(endpoint, "_blank");
    }

    function startAutoRefresh() {
      setInterval(function () {
        loadReport();
      }, POLL_MS);
    }

    document.getElementById("refreshBtn").addEventListener("click", function () {
      loadReport();
    });
    document.getElementById("csvBtn").addEventListener("click", downloadCsv);

    document.getElementById("urlSearch").addEventListener("input", function (e) {
      state.urlSearch = e.target.value || "";
      refreshFilterOptions();
    });

    document.getElementById("applyFilterBtn").addEventListener("click", function () {
      state.selectedUrls = selectedFromUi();
      state.expandedUrl = null;
      state.detailCache = Object.create(null);
      loadReport();
    });

    document.getElementById("clearFilterBtn").addEventListener("click", function () {
      state.selectedUrls = [];
      state.expandedUrl = null;
      state.detailCache = Object.create(null);
      refreshFilterOptions();
      loadReport();
    });

    document.getElementById("selectAllBtn").addEventListener("click", function () {
      var opts = Array.from(document.getElementById("urlFilter").options);
      opts.forEach(function (o) { o.selected = true; });
      state.selectedUrls = selectedFromUi();
      state.expandedUrl = null;
      state.detailCache = Object.create(null);
      loadReport();
    });

    setDefaultRange();
    loadReport();
    startAutoRefresh();
  </script>
</body>
</html>
